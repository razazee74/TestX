<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Chat App</title>
<style>
body {
  font-family: Arial;
  background: #0f172a;
  color: white;
  margin: 0;
}
.container {
  display: flex;
  height: 100vh;
}
.sidebar {
  width: 30%;
  background: #1e293b;
  padding: 10px;
}
.chat {
  width: 70%;
  display: flex;
  flex-direction: column;
}
input, button {
  padding: 10px;
  margin: 5px 0;
  border: none;
}
button {
  background: #3b82f6;
  color: white;
  cursor: pointer;
}
.profile {
  margin-bottom: 20px;
}
.messages {
  flex: 1;
  padding: 10px;
  overflow-y: auto;
}
.msg {
  background: #334155;
  padding: 8px;
  margin: 5px;
  border-radius: 5px;
}
</style>
</head>

<body>

<div class="container">

  <!-- Sidebar -->
  <div class="sidebar">
    <div class="profile">
      <h3>Create Profile</h3>
      <input id="name" placeholder="Name">
      <input id="username" placeholder="Username">
      <input id="bio" placeholder="Bio">
      <button onclick="createProfile()">Save</button>
    </div>

    <div>
      <h3>Search User</h3>
      <input id="searchUser" placeholder="Enter username">
      <button onclick="addFriend()">Add Friend</button>
    </div>

    <div>
      <h3>Friends</h3>
      <ul id="friends"></ul>
    </div>
  </div>

  <!-- Chat -->
  <div class="chat">
    <div class="messages" id="messages"></div>
    <input id="msgInput" placeholder="Type message">
    <button onclick="sendMsg()">Send</button>
  </div>

</div>

<script>
let profile = {};
let friends = [];

function createProfile() {
  profile.name = document.getElementById("name").value;
  profile.username = document.getElementById("username").value;
  profile.bio = document.getElementById("bio").value;

  alert("Profile Created!");
}

function addFriend() {
  let user = document.getElementById("searchUser").value;
  if(user) {
    friends.push(user);
    renderFriends();
  }
}

function renderFriends() {
  let list = document.getElementById("friends");
  list.innerHTML = "";
  friends.forEach(f => {
    let li = document.createElement("li");
    li.innerText = f;
    list.appendChild(li);
  });
}

function sendMsg() {
  let msg = document.getElementById("msgInput").value;
  if(!msg) return;

  let box = document.getElementById("messages");

  let div = document.createElement("div");
  div.className = "msg";
  div.innerText = profile.username + ": " + msg;

  box.appendChild(div);
  document.getElementById("msgInput").value = "";
}
</script>

</body>
</html>
